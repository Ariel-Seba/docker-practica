services:
  traefik:
    image: traefik:v2.11
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--api.dashboard=true"
      - "--api.insecure=true"
    ports:
      - "80:80"
      - "8090:8080"
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    security_opt:
      - no-new-privileges:true
    volumes:
      - /Users/ariel.a.seba/.docker/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - frontend
      - backend


  web:
    build: .
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=PathPrefix(`/`)"
      - "traefik.http.services.web.loadbalancer.server.port=80"
      - "traefik.http.routers.web.priority=1"
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M
    networks:
      - frontend



  whoami:
    image: traefik/whoami
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=PathPrefix(`/whoami`)"
      - "traefik.http.services.whoami.loadbalancer.server.port=80"
    restart: always
    networks:
      - frontend

  backend:
    build: ./backend
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=PathPrefix(`/api`)"
      - "traefik.http.middlewares.strip-api.stripprefix.prefixes=/api"
      - "traefik.http.routers.backend.middlewares=strip-api"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
      - "traefik.http.routers.backend.priority=10"
      - "traefik.docker.network=nginx_backend"

    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    networks:
      - backend


  db:
    image: postgres:16.3-alpine3.20
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ari -d agenda"]
      interval: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    networks:
      - backend


  atlas:
    image: keinstien/atlas:latest
    platform: linux/amd64
    ports:
      - "5001:8888"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ari@ari.com
      PGADMIN_DEFAULT_PASSWORD: admin
      SCRIPT_NAME: /pgadmin
    restart: always
    networks:
      - backend

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pgadmin.rule=PathPrefix(`/pgadmin`)"
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"
      - "traefik.http.routers.pgadmin.priority=10"
      - "traefik.docker.network=nginx_backend"



volumes:
  db_data:

networks:
  frontend:
  backend: